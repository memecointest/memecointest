<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Top 50 Holders — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

/* ════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════ */
:root {
  --void:       #06001A;
  --deep:       #0D0029;
  --panel:      #110033;
  --violet:     #7B2FFF;
  --violet-dim: #3D1880;
  --cyan:       #00FFD1;
  --magenta:    #FF3CAC;
  --gold:       #FFD166;
  --white-warm: #F0EBE3;
  --muted:      #5A4E7A;
  --muted-light:#8A7BA8;

  --font-display: 'Orbitron', sans-serif;
  --font-body:    'Space Grotesk', sans-serif;
  --font-mono:    'Courier New', monospace;

  --card-depth: 12px;
  --card-depth-neg: -12px;
}

/* ════════════════════════════════════════════
   RESET
════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--void);
  color: var(--white-warm);
  font-family: var(--font-body);
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ════════════════════════════════════════════
   BACKGROUND — perspective grid + nebula
════════════════════════════════════════════ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Perspective grid floor */
.bg-grid {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200%;
  height: 70%;
  background-image:
    linear-gradient(rgba(123,47,255,0.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,47,255,0.18) 1px, transparent 1px);
  background-size: 60px 60px;
  transform-origin: bottom center;
  transform: translateX(-50%) perspective(400px) rotateX(70deg);
  mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
  -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
}

/* Nebula glow blobs */
.bg-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.22;
}
.bg-blob-1 {
  width: 600px; height: 600px;
  background: var(--violet);
  top: -200px; left: -150px;
}
.bg-blob-2 {
  width: 500px; height: 500px;
  background: var(--cyan);
  top: 100px; right: -200px;
  opacity: 0.12;
}
.bg-blob-3 {
  width: 400px; height: 400px;
  background: var(--magenta);
  bottom: 100px; left: 30%;
  opacity: 0.1;
}

/* Scanline overlay */
.bg-scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
}

/* ════════════════════════════════════════════
   PAGE WRAP
════════════════════════════════════════════ */
.page {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 100px;
}

/* ════════════════════════════════════════════
   HEADER
════════════════════════════════════════════ */
.header {
  padding: 52px 0 48px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
}

.header-brand {}

.brand-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-eyebrow::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--cyan);
}

.brand-title {
  font-family: var(--font-display);
  font-size: clamp(38px, 6vw, 72px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  /* 2.5D text depth */
  text-shadow:
    1px 1px 0 var(--violet-dim),
    2px 2px 0 var(--violet-dim),
    3px 3px 0 rgba(123,47,255,0.5),
    4px 4px 0 rgba(123,47,255,0.3),
    5px 5px 0 rgba(123,47,255,0.15),
    0 0 40px rgba(123,47,255,0.6);
}

.brand-title .accent { color: var(--cyan); }
.brand-title .accent-2 { color: var(--magenta); }

.brand-sub {
  margin-top: 16px;
  font-size: 13px;
  color: var(--muted-light);
  font-weight: 300;
  letter-spacing: 0.04em;
}

/* Live pill */
.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(0,255,209,0.3);
  background: rgba(0,255,209,0.06);
  border-radius: 100px;
  padding: 8px 18px 8px 12px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: live-pulse 2s ease-in-out infinite;
}

@keyframes live-pulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 8px var(--cyan); }
  50%      { transform: scale(1.3); box-shadow: 0 0 16px var(--cyan), 0 0 24px rgba(0,255,209,0.4); }
}

.live-text {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
}

.header-status {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
  padding-top: 8px;
}

.last-sync {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.08em;
}

/* ════════════════════════════════════════════
   DIVIDER
════════════════════════════════════════════ */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--violet-dim) 20%, var(--violet) 50%, var(--violet-dim) 80%, transparent 100%);
  margin-bottom: 48px;
  position: relative;
}
.divider::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 1px;
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan);
}

/* ════════════════════════════════════════════
   TOP 3 PODIUM — isometric cards
════════════════════════════════════════════ */
.podium {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  margin-bottom: 48px;
  perspective: 1000px;
}

/* Each podium card is a 2.5D layered card */
.podium-card {
  position: relative;
  padding: 28px 24px 24px;
  border-radius: 4px;
  cursor: default;
  transition: transform 0.3s ease;
  transform-style: preserve-3d;
}

.podium-card:hover {
  transform: translateY(-6px) rotateX(3deg);
}

/* Card "body" face */
.podium-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  border: 1px solid;
  z-index: 0;
}

/* Card "depth" — bottom/right faces */
.podium-card::after {
  content: '';
  position: absolute;
  border-radius: 0 0 4px 0;
  z-index: -1;
}

/* Card 1 — Gold */
.podium-card-1 {
  background: linear-gradient(145deg, rgba(255,209,102,0.12) 0%, rgba(255,209,102,0.04) 100%);
}
.podium-card-1::before {
  border-color: rgba(255,209,102,0.5);
  box-shadow:
    inset 0 1px 0 rgba(255,209,102,0.2),
    0 0 30px rgba(255,209,102,0.15),
    0 20px 40px rgba(0,0,0,0.4);
}
.podium-card-1::after {
  top: var(--card-depth); left: var(--card-depth);
  right: var(--card-depth-neg); bottom: var(--card-depth-neg);
  background: rgba(255,209,102,0.08);
  border: 1px solid rgba(255,209,102,0.2);
}

/* Card 2 — Violet */
.podium-card-2 {
  background: linear-gradient(145deg, rgba(123,47,255,0.18) 0%, rgba(123,47,255,0.06) 100%);
}
.podium-card-2::before {
  border-color: rgba(123,47,255,0.6);
  box-shadow:
    inset 0 1px 0 rgba(123,47,255,0.3),
    0 0 30px rgba(123,47,255,0.2),
    0 20px 40px rgba(0,0,0,0.4);
}
.podium-card-2::after {
  top: var(--card-depth); left: var(--card-depth);
  right: var(--card-depth-neg); bottom: var(--card-depth-neg);
  background: rgba(123,47,255,0.1);
  border: 1px solid rgba(123,47,255,0.25);
}

/* Card 3 — Cyan */
.podium-card-3 {
  background: linear-gradient(145deg, rgba(0,255,209,0.1) 0%, rgba(0,255,209,0.03) 100%);
}
.podium-card-3::before {
  border-color: rgba(0,255,209,0.4);
  box-shadow:
    inset 0 1px 0 rgba(0,255,209,0.15),
    0 0 30px rgba(0,255,209,0.1),
    0 20px 40px rgba(0,0,0,0.4);
}
.podium-card-3::after {
  top: var(--card-depth); left: var(--card-depth);
  right: var(--card-depth-neg); bottom: var(--card-depth-neg);
  background: rgba(0,255,209,0.06);
  border: 1px solid rgba(0,255,209,0.18);
}

.podium-card-inner {
  position: relative;
  z-index: 1;
}

.podium-rank-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.podium-card-1 .podium-rank-label { color: var(--gold); }
.podium-card-2 .podium-rank-label { color: var(--violet); }
.podium-card-3 .podium-rank-label { color: var(--cyan); }

.podium-rank-num {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(48px, 5vw, 80px);
  line-height: 0.85;
  margin-bottom: 20px;
  display: block;
}
.podium-card-1 .podium-rank-num {
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,209,102,0.6), 2px 2px 0 rgba(255,209,102,0.3);
}
.podium-card-2 .podium-rank-num {
  color: var(--violet);
  text-shadow: 0 0 20px rgba(123,47,255,0.8), 2px 2px 0 rgba(123,47,255,0.4);
}
.podium-card-3 .podium-rank-num {
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,255,209,0.6), 2px 2px 0 rgba(0,255,209,0.3);
}

.podium-addr {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-light);
  margin-bottom: 16px;
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.podium-quantity {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--white-warm);
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.podium-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
  gap: 8px;
  flex-wrap: wrap;
}

.podium-pct {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
}
.podium-card-1 .podium-pct { color: var(--gold); }
.podium-card-2 .podium-pct { color: var(--violet); filter: brightness(1.5); }
.podium-card-3 .podium-pct { color: var(--cyan); }

.podium-value {
  font-size: 12px;
  color: var(--muted-light);
  font-weight: 300;
}

/* copy button on podium */
.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-light);
  letter-spacing: 0.04em;
  text-align: left;
  transition: color 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: block;
}
.copy-btn:hover, .copy-btn:focus { color: var(--cyan); outline: none; }
.copy-btn:focus-visible { outline: 1px solid var(--cyan); outline-offset: 2px; }
.copy-btn.copied { color: var(--cyan) !important; }

/* ════════════════════════════════════════════
   TABLE SECTION HEADER
════════════════════════════════════════════ */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}

.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted-light);
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::before {
  content: '';
  display: inline-block;
  width: 16px; height: 1px;
  background: var(--violet);
  box-shadow: 0 0 6px var(--violet);
}

/* ════════════════════════════════════════════
   TABLE WRAPPER — the 2.5D panel
════════════════════════════════════════════ */
.table-panel {
  position: relative;
  border-radius: 6px 6px 4px 4px;
  overflow: hidden;
}

/* Panel top edge glow */
.table-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--violet) 30%,
    var(--cyan) 50%,
    var(--violet) 70%,
    transparent 100%
  );
  z-index: 3;
}

/* Panel depth shadow — gives the 2.5D elevation */
.table-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  box-shadow:
    0 1px 0 rgba(123,47,255,0.4) inset,
    0 -1px 0 rgba(0,0,0,0.6) inset,
    8px 8px 0 rgba(123,47,255,0.06),
    16px 16px 0 rgba(123,47,255,0.03),
    0 32px 64px rgba(0,0,0,0.5),
    0 0 0 1px rgba(123,47,255,0.2);
  pointer-events: none;
  z-index: 2;
}

.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: rgba(13, 0, 41, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* ════════════════════════════════════════════
   TABLE
════════════════════════════════════════════ */
#holders-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 560px;
}

/* HEAD */
#holders-table thead tr {
  background: rgba(123,47,255,0.12);
  border-bottom: 1px solid rgba(123,47,255,0.3);
}
#holders-table thead th {
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--muted-light);
  font-weight: 400;
  white-space: nowrap;
  text-align: left;
}
#holders-table thead th.th-right { text-align: right; }

/* BODY */
#holders-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.12s ease;
  position: relative;
}
#holders-table tbody tr:hover {
  background: rgba(123,47,255,0.09);
}

/* Alternating micro-depth on odd rows */
#holders-table tbody tr:nth-child(odd) {
  background: rgba(255,255,255,0.015);
}
#holders-table tbody tr:nth-child(odd):hover {
  background: rgba(123,47,255,0.09);
}

#holders-table tbody td {
  padding: 11px 16px;
  font-size: 12px;
  vertical-align: middle;
}

/* RANK */
.td-rank {
  width: 56px;
  text-align: right;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  padding-right: 20px !important;
}

/* ADDR */
.td-addr {
  max-width: 200px;
}

/* NUM */
.td-num {
  text-align: right;
  font-weight: 500;
  font-size: 12px;
  color: var(--white-warm);
  letter-spacing: 0.02em;
}

/* PCT */
.td-pct { text-align: right; }

.pct-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}
.pct-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--cyan);
  letter-spacing: 0.04em;
}
.pct-track {
  width: 64px;
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 1px;
  overflow: hidden;
}
.pct-fill {
  height: 100%;
  border-radius: 1px;
  background: linear-gradient(90deg, var(--violet), var(--cyan));
  transition: width 0.5s ease;
  box-shadow: 0 0 6px var(--cyan);
}

/* VALUE */
.td-value {
  text-align: right;
  font-weight: 500;
  color: var(--muted-light);
  font-size: 12px;
}

/* TOKEN ACC — hidden on small screens */
.td-token { max-width: 180px; }

/* ════════════════════════════════════════════
   ROW FLASH on update
════════════════════════════════════════════ */
@keyframes row-flash {
  0%   { background: rgba(0,255,209,0.12); }
  100% { background: transparent; }
}
.row-flash {
  animation: row-flash 0.9s ease-out forwards;
}

/* ════════════════════════════════════════════
   GLITCH text animation on update
════════════════════════════════════════════ */
@keyframes glitch {
  0%   { clip-path: inset(40% 0 50% 0); transform: translate(-4px, 0); opacity: 0.6; }
  20%  { clip-path: inset(10% 0 80% 0); transform: translate(4px, 0);  opacity: 0.8; }
  40%  { clip-path: inset(70% 0 10% 0); transform: translate(-2px, 0); opacity: 0.7; }
  60%  { clip-path: inset(30% 0 60% 0); transform: translate(2px, 0);  opacity: 0.9; }
  80%  { clip-path: inset(0% 0 0% 0);   transform: translate(0, 0);    opacity: 1; }
  100% { clip-path: none;               transform: translate(0, 0);    opacity: 1; }
}

.cell-glitch {
  animation: glitch 0.35s steps(1) forwards;
}

/* ════════════════════════════════════════════
   LOADING
════════════════════════════════════════════ */
.loading {
  padding: 80px 20px;
  text-align: center;
}
.loading-icon {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 900;
  color: var(--violet);
  text-shadow: 0 0 30px var(--violet);
  animation: loading-pulse 1.4s ease-in-out infinite;
  display: block;
  margin-bottom: 20px;
}
@keyframes loading-pulse {
  0%,100% { opacity: 0.3; transform: scale(0.95); }
  50%      { opacity: 1;   transform: scale(1.05); }
}
.loading-text {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted-light);
}

/* ════════════════════════════════════════════
   ERROR
════════════════════════════════════════════ */
.error-block {
  padding: 60px 20px;
  text-align: center;
}
.error-code {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 900;
  color: var(--magenta);
  text-shadow: 0 0 20px rgba(255,60,172,0.5);
  display: block;
  margin-bottom: 12px;
}
.error-text {
  font-size: 13px;
  color: var(--muted-light);
  letter-spacing: 0.06em;
}
.error-detail {
  display: block;
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255,60,172,0.6);
}

/* ════════════════════════════════════════════
   FOOTER
════════════════════════════════════════════ */
.footer {
  margin-top: 80px;
  padding-top: 24px;
  border-top: 1px solid rgba(123,47,255,0.2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-note {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
}
.footer-brand {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--violet);
  text-shadow: 0 0 12px rgba(123,47,255,0.6);
}

/* ════════════════════════════════════════════
   REFRESH COUNTDOWN BAR
════════════════════════════════════════════ */
.countdown-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.04);
  z-index: 100;
}
.countdown-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--violet), var(--cyan));
  box-shadow: 0 0 8px var(--cyan);
  transition: width 1s linear;
}

/* ════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════ */
@media (max-width: 860px) {
  .podium { grid-template-columns: 1fr; gap: 16px; }
  .podium-card { padding: 22px 20px; }
  .podium-rank-num { font-size: 48px; }
}

@media (max-width: 640px) {
  .header { padding: 36px 0 32px; }
  .brand-title { font-size: clamp(32px, 9vw, 52px); }
  .col-token { display: none; }
  #holders-table { min-width: 400px; }
  .pct-track { width: 40px; }
  .header-status { align-items: flex-start; }
}

@media (max-width: 400px) {
  .page { padding: 0 14px 80px; }
  .brand-title { font-size: 32px; }
}

/* ════════════════════════════════════════════
   REDUCED MOTION
════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  .live-dot { animation: none !important; }
  .loading-icon { animation: none !important; opacity: 0.6; }
  .row-flash { animation: none !important; }
  .cell-glitch { animation: none !important; }
  .pct-fill { transition: none !important; }
  .podium-card { transition: none !important; }
  .countdown-bar { transition: none !important; }
}

</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="bg-grid"></div>
  <div class="bg-scanlines"></div>
</div>

<!-- Countdown bar -->
<div class="countdown-wrap" aria-hidden="true">
  <div class="countdown-bar" id="countdown-bar" style="width:100%"></div>
</div>

<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <p class="brand-eyebrow">Solana · Mainnet · Live Data</p>
      <h1 class="brand-title">
        Top <span class="accent">50</span><br>
        <span class="accent-2">Holders</span>
      </h1>
      <p class="brand-sub">Ranked by current balance · auto-syncs every 30s</p>
    </div>
    <div class="header-status">
      <div class="live-pill">
        <span class="live-dot" id="live-dot"></span>
        <span class="live-text" id="live-label">Live</span>
      </div>
      <span class="last-sync" id="last-sync">—</span>
    </div>
  </header>

  <div class="divider" aria-hidden="true"></div>

  <!-- PODIUM TOP 3 -->
  <div class="podium" id="podium" aria-label="Top 3 holders">
    <!-- filled by JS -->
  </div>

  <!-- TABLE 4–50 -->
  <div class="section-head">
    <span class="section-label">Positions 4 — 50</span>
  </div>

  <div class="table-panel">
    <div class="table-scroll">
      <div id="table-container">
        <div class="loading">
          <span class="loading-icon">◈</span>
          <p class="loading-text">Summoning the whales…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-note">On-chain data · Solana mainnet · refreshes every 30s</span>
    <span class="footer-brand">◎ SOL</span>
  </footer>

</div><!-- /page -->

<script>
/* ─── ELEMENTS ─────────────────────────────────────── */
const podiumEl    = document.getElementById('podium');
const tableEl     = document.getElementById('table-container');
const lastSyncEl  = document.getElementById('last-sync');
const liveLabelEl = document.getElementById('live-label');
const liveDotEl   = document.getElementById('live-dot');
const countdownBar= document.getElementById('countdown-bar');

/* ─── STATE ────────────────────────────────────────── */
let prevData     = null;
let countdownInt = null;
let countdownVal = 30;

/* ─── HELPERS ──────────────────────────────────────── */
function esc(t) {
  return String(t).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])
  );
}

function shorten(addr, head=5, tail=5) {
  if (!addr || addr.length < head + tail + 3) return addr;
  return addr.slice(0, head) + '…' + addr.slice(-tail);
}

function fmtQ(n) {
  if (typeof n !== 'number') return esc(String(n));
  return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}
function fmtP(n) {
  if (typeof n !== 'number') return esc(String(n));
  return n.toFixed(2);
}
function fmtV(n) {
  if (typeof n !== 'number') return esc(String(n));
  return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* ─── COPY ─────────────────────────────────────────── */
async function copyAddr(btn, full) {
  try {
    await navigator.clipboard.writeText(full);
    const prev = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1600);
  } catch(_) {}
}

function makeCopyBtn(addr, className='') {
  const btn = document.createElement('button');
  btn.className = 'copy-btn' + (className ? ' ' + className : '');
  btn.textContent = shorten(addr);
  btn.title = addr;
  btn.setAttribute('aria-label', `Copy address ${addr}`);
  btn.addEventListener('click', () => copyAddr(btn, addr));
  return btn;
}

/* ─── MAX PCT ──────────────────────────────────────── */
function getMaxPct(data) {
  return data.reduce((m, r) => (typeof r['%'] === 'number' && r['%'] > m ? r['%'] : m), 0) || 1;
}

/* ─── PREV MAP ─────────────────────────────────────── */
function buildPrevMap(data) {
  const m = {};
  if (!data) return m;
  data.forEach(r => {
    const k = r['Token Account'] || r['Account (Owner)'];
    if (k) m[k] = { qty: r['Quantity'], rank: r['Rank'] };
  });
  return m;
}

/* ─── PODIUM ───────────────────────────────────────── */
function renderPodium(top3) {
  podiumEl.innerHTML = '';
  const labels  = ['🥇 First', '🥈 Second', '🥉 Third'];
  const classes = ['podium-card-1', 'podium-card-2', 'podium-card-3'];

  top3.forEach((row, i) => {
    const rank  = row['Rank'] ?? (i + 1);
    const owner = row['Account (Owner)'] || '';
    const qty   = fmtQ(row['Quantity']);
    const pct   = fmtP(row['%']);
    const val   = fmtV(row['Value']);

    const card = document.createElement('div');
    card.className = `podium-card ${classes[i]}`;
    card.setAttribute('aria-label', `Rank ${rank} holder`);

    card.innerHTML = `
      <div class="podium-card-inner">
        <p class="podium-rank-label">${esc(labels[i])}</p>
        <span class="podium-rank-num">${rank}</span>
        <p class="podium-quantity">${qty} tokens</p>
        <div class="podium-meta">
          <span class="podium-pct">${pct}%</span>
          <span class="podium-value">$${esc(val)}</span>
        </div>
      </div>`;

    /* insert copy btn */
    const addrP = document.createElement('p');
    addrP.className = 'podium-addr';
    const cpBtn = makeCopyBtn(owner);
    addrP.appendChild(cpBtn);
    card.querySelector('.podium-card-inner').insertBefore(addrP,
      card.querySelector('.podium-quantity'));

    podiumEl.appendChild(card);
  });
}

/* ─── TABLE ────────────────────────────────────────── */
function renderTable(rest, prevMap, maxPct) {
  if (rest.length === 0) {
    tableEl.innerHTML = '';
    return;
  }

  const table = document.createElement('table');
  table.id = 'holders-table';

  table.innerHTML = `
    <thead>
      <tr>
        <th class="th-right">#</th>
        <th>Wallet</th>
        <th class="col-token">Token Account</th>
        <th class="th-right">Balance</th>
        <th class="th-right">Share</th>
        <th class="th-right">Value (USD)</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>`;

  const tbody = table.querySelector('#tbody');

  rest.forEach((row, i) => {
    const rank     = row['Rank'] ?? (i + 4);
    const owner    = row['Account (Owner)'] || '';
    const tokenAcc = row['Token Account']   || '';
    const pctRaw   = typeof row['%'] === 'number' ? row['%'] : 0;
    const barW     = Math.min(100, (pctRaw / maxPct) * 100).toFixed(1);

    const key     = tokenAcc || owner;
    const prev    = prevMap[key];
    const changed = prev && prev.qty !== row['Quantity'];

    const tr = document.createElement('tr');
    if (changed) tr.classList.add('row-flash');

    /* Rank */
    const tdRank = document.createElement('td');
    tdRank.className = 'td-rank';
    tdRank.textContent = rank;
    tr.appendChild(tdRank);

    /* Owner addr */
    const tdOwner = document.createElement('td');
    tdOwner.className = 'td-addr';
    const ownerBtn = makeCopyBtn(owner);
    if (changed) ownerBtn.classList.add('cell-glitch');
    tdOwner.appendChild(ownerBtn);
    tr.appendChild(tdOwner);

    /* Token acc */
    const tdToken = document.createElement('td');
    tdToken.className = 'td-addr td-token col-token';
    const tokenBtn = makeCopyBtn(tokenAcc);
    tdToken.appendChild(tokenBtn);
    tr.appendChild(tdToken);

    /* Quantity */
    const tdQty = document.createElement('td');
    tdQty.className = 'td-num';
    tdQty.textContent = fmtQ(row['Quantity']);
    if (changed) tdQty.classList.add('cell-glitch');
    tr.appendChild(tdQty);

    /* Pct */
    const tdPct = document.createElement('td');
    tdPct.className = 'td-pct';
    tdPct.innerHTML = `
      <div class="pct-wrap">
        <span class="pct-num">${fmtP(row['%'])}%</span>
        <div class="pct-track"><div class="pct-fill" style="width:${barW}%"></div></div>
      </div>`;
    tr.appendChild(tdPct);

    /* Value */
    const tdVal = document.createElement('td');
    tdVal.className = 'td-value';
    tdVal.textContent = '$' + fmtV(row['Value']);
    tr.appendChild(tdVal);

    tbody.appendChild(tr);
  });

  tableEl.innerHTML = '';
  tableEl.appendChild(table);
}

/* ─── RENDER ALL ───────────────────────────────────── */
function renderAll(data) {
  if (!Array.isArray(data) || data.length === 0) {
    renderError('No holder data found.');
    return;
  }

  const prevMap = buildPrevMap(prevData);
  const maxP    = getMaxPct(data);

  const top3 = data.slice(0, 3);
  const rest  = data.slice(3);

  renderPodium(top3);
  renderTable(rest, prevMap, maxP);

  prevData = data;
}

/* ─── ERROR ────────────────────────────────────────── */
function renderError(msg) {
  /* don't wipe an existing good table */
  if (tableEl.querySelector('#holders-table')) return;
  tableEl.innerHTML = `
    <div class="error-block">
      <span class="error-code">ERR</span>
      <p class="error-text">Couldn't reach the chain right now.</p>
      <span class="error-detail">${esc(msg)}</span>
    </div>`;
}

/* ─── SYNC UI ──────────────────────────────────────── */
function setSyncing(active) {
  if (active) {
    liveLabelEl.textContent = 'Syncing…';
    liveDotEl.style.background = 'var(--gold)';
    liveDotEl.style.boxShadow  = '0 0 8px var(--gold)';
  } else {
    liveLabelEl.textContent = 'Live';
    liveDotEl.style.background = 'var(--cyan)';
    liveDotEl.style.boxShadow  = '0 0 8px var(--cyan)';
  }
}

/* ─── COUNTDOWN ────────────────────────────────────── */
function startCountdown() {
  clearInterval(countdownInt);
  countdownVal = 30;
  countdownBar.style.width = '100%';

  countdownInt = setInterval(() => {
    countdownVal = Math.max(0, countdownVal - 1);
    const pct = (countdownVal / 30) * 100;
    countdownBar.style.width = pct + '%';
  }, 1000);
}

/* ─── FETCH ────────────────────────────────────────── */
async function loadData() {
  setSyncing(true);
  try {
    const res  = await fetch(`date.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    renderAll(json);

    const now = new Date();
    lastSyncEl.textContent = `Synced at ${now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`;
    setSyncing(false);
    startCountdown();
  } catch(err) {
    console.error('Load error:', err);
    renderError(err.message);
    liveLabelEl.textContent = 'Error';
    liveDotEl.style.background = 'var(--magenta)';
    liveDotEl.style.boxShadow  = '0 0 8px var(--magenta)';
  }
}

/* ─── INIT ─────────────────────────────────────────── */
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
