<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Top 50 Holders — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

/* ════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════ */
:root {
  --void:        #06001A;
  --deep:        #0D0029;
  --panel:       #110033;
  --violet:      #7B2FFF;
  --violet-dim:  #3D1880;
  --cyan:        #00FFD1;
  --magenta:     #FF3CAC;
  --gold:        #FFD166;
  --gold-dim:    #A8893F;
  --white-warm:  #F0EBE3;
  --muted:       #5A4E7A;
  --muted-light: #8A7BA8;

  --font-display: 'Orbitron', sans-serif;
  --font-body:    'Space Grotesk', sans-serif;
  --font-mono:    'Courier New', monospace;
}

/* ════════════════════════════════════════════
   RESET
════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--void);
  color: var(--white-warm);
  font-family: var(--font-body);
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ════════════════════════════════════════════
   BACKGROUND
════════════════════════════════════════════ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-grid {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 200%;
  height: 70%;
  background-image:
    linear-gradient(rgba(123,47,255,0.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,47,255,0.18) 1px, transparent 1px);
  background-size: 60px 60px;
  transform-origin: bottom center;
  transform: translateX(-50%) perspective(400px) rotateX(70deg);
  mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
  -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
}

.bg-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.22;
}
.bg-blob-1 { width:600px; height:600px; background:var(--violet); top:-200px; left:-150px; }
.bg-blob-2 { width:500px; height:500px; background:var(--cyan);   top:100px;  right:-200px; opacity:0.12; }
.bg-blob-3 { width:400px; height:400px; background:var(--magenta);bottom:100px;left:30%;    opacity:0.1; }

.bg-scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
}

/* ════════════════════════════════════════════
   PAGE WRAP
════════════════════════════════════════════ */
.page {
  position: relative;
  z-index: 1;
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ════════════════════════════════════════════
   HEADER — compact, no subtitle
════════════════════════════════════════════ */
.header {
  padding: 44px 0 36px;
}

.brand-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted-light);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* $ sign — gold 2.5D */
.dollar-sign {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  color: var(--gold);
  text-shadow:
    1px 1px 0 var(--gold-dim),
    2px 2px 0 rgba(168,137,63,0.7),
    3px 3px 0 rgba(168,137,63,0.4),
    4px 4px 0 rgba(168,137,63,0.2),
    0 0 20px rgba(255,209,102,0.5);
  line-height: 1;
  display: inline-block;
}

.eyebrow-name {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--gold);
  text-shadow: 0 0 12px rgba(255,209,102,0.4);
}

.eyebrow-sep {
  color: var(--muted);
  margin: 0 4px;
}

.eyebrow-detail {
  color: var(--muted-light);
  font-size: 10px;
  letter-spacing: 0.18em;
}

.brand-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 6vw, 76px);
  font-weight: 900;
  line-height: 0.88;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  text-shadow:
    1px 1px 0 var(--violet-dim),
    2px 2px 0 var(--violet-dim),
    3px 3px 0 rgba(123,47,255,0.5),
    4px 4px 0 rgba(123,47,255,0.3),
    5px 5px 0 rgba(123,47,255,0.15),
    0 0 40px rgba(123,47,255,0.5);
}

.brand-title .accent  { color: var(--cyan); }
.brand-title .accent2 { color: var(--magenta); }

/* ════════════════════════════════════════════
   DIVIDER
════════════════════════════════════════════ */
.divider {
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--violet-dim) 20%,
    var(--violet) 50%,
    var(--violet-dim) 80%,
    transparent 100%
  );
  margin-bottom: 36px;
  position: relative;
}
.divider::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 1px;
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan);
}

/* ════════════════════════════════════════════
   PODIUM — top 3 cards
════════════════════════════════════════════ */
.podium {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 32px;
  perspective: 1000px;
}

.podium-card {
  position: relative;
  padding: 22px 18px 20px;
  border-radius: 4px;
  transition: transform 0.3s ease;
  transform-style: preserve-3d;
  min-width: 0; /* allow shrink */
}
.podium-card:hover {
  transform: translateY(-5px) rotateX(3deg);
}

.podium-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  border: 1px solid;
  z-index: 0;
  pointer-events: none;
}
.podium-card::after {
  content: '';
  position: absolute;
  top: 10px; left: 10px;
  right: -10px; bottom: -10px;
  border-radius: 4px;
  z-index: -1;
}

/* Card colours */
.podium-card-1 {
  background: linear-gradient(145deg, rgba(255,209,102,0.13) 0%, rgba(255,209,102,0.04) 100%);
}
.podium-card-1::before {
  border-color: rgba(255,209,102,0.5);
  box-shadow: 0 0 28px rgba(255,209,102,0.14), 0 18px 36px rgba(0,0,0,0.45);
}
.podium-card-1::after {
  background: rgba(255,209,102,0.08);
  border: 1px solid rgba(255,209,102,0.18);
}

.podium-card-2 {
  background: linear-gradient(145deg, rgba(123,47,255,0.18) 0%, rgba(123,47,255,0.06) 100%);
}
.podium-card-2::before {
  border-color: rgba(123,47,255,0.6);
  box-shadow: 0 0 28px rgba(123,47,255,0.2), 0 18px 36px rgba(0,0,0,0.45);
}
.podium-card-2::after {
  background: rgba(123,47,255,0.1);
  border: 1px solid rgba(123,47,255,0.24);
}

.podium-card-3 {
  background: linear-gradient(145deg, rgba(0,255,209,0.10) 0%, rgba(0,255,209,0.03) 100%);
}
.podium-card-3::before {
  border-color: rgba(0,255,209,0.4);
  box-shadow: 0 0 28px rgba(0,255,209,0.1), 0 18px 36px rgba(0,0,0,0.45);
}
.podium-card-3::after {
  background: rgba(0,255,209,0.06);
  border: 1px solid rgba(0,255,209,0.16);
}

.podium-inner {
  position: relative;
  z-index: 1;
}

.podium-rank-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.podium-card-1 .podium-rank-label { color: var(--gold); }
.podium-card-2 .podium-rank-label { color: #a07aff; }
.podium-card-3 .podium-rank-label { color: var(--cyan); }

.podium-rank-num {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(40px, 4.5vw, 68px);
  line-height: 0.85;
  margin-bottom: 14px;
  display: block;
}
.podium-card-1 .podium-rank-num {
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,209,102,0.6), 2px 2px 0 rgba(255,209,102,0.3);
}
.podium-card-2 .podium-rank-num {
  color: var(--violet);
  text-shadow: 0 0 20px rgba(123,47,255,0.9), 2px 2px 0 rgba(123,47,255,0.4);
  filter: brightness(1.6);
}
.podium-card-3 .podium-rank-num {
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,255,209,0.6), 2px 2px 0 rgba(0,255,209,0.3);
}

/* Addresses block — both visible */
.podium-addresses {
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.addr-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.addr-field-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
}

.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-light);
  letter-spacing: 0.03em;
  text-align: left;
  transition: color 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: block;
  width: 100%;
}
.copy-btn:hover, .copy-btn:focus { color: var(--cyan); outline: none; }
.copy-btn:focus-visible { outline: 1px solid var(--cyan); outline-offset: 2px; }
.copy-btn.copied { color: var(--cyan) !important; }

.podium-quantity {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--white-warm);
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.podium-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  gap: 6px;
  flex-wrap: wrap;
}

.podium-pct {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.podium-card-1 .podium-pct { color: var(--gold); }
.podium-card-2 .podium-pct { color: #a07aff; }
.podium-card-3 .podium-pct { color: var(--cyan); }

.podium-value {
  font-size: 11px;
  color: var(--muted-light);
  font-weight: 300;
}

/* ════════════════════════════════════════════
   TABLE SECTION
════════════════════════════════════════════ */
.section-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.section-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--muted-light);
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.section-label::before {
  content: '';
  display: inline-block;
  width: 14px; height: 1px;
  background: var(--violet);
  box-shadow: 0 0 6px var(--violet);
}

/* ════════════════════════════════════════════
   TABLE PANEL
════════════════════════════════════════════ */
.table-panel {
  position: relative;
  border-radius: 6px 6px 4px 4px;
  overflow: hidden;
  margin-bottom: 28px;
}
.table-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    transparent 0%, var(--violet) 30%, var(--cyan) 50%, var(--violet) 70%, transparent 100%);
  z-index: 3;
}
.table-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  box-shadow:
    0 1px 0 rgba(123,47,255,0.4) inset,
    8px 8px 0 rgba(123,47,255,0.06),
    16px 16px 0 rgba(123,47,255,0.03),
    0 32px 64px rgba(0,0,0,0.5),
    0 0 0 1px rgba(123,47,255,0.2);
  pointer-events: none;
  z-index: 2;
}

.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: rgba(13,0,41,0.72);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* ════════════════════════════════════════════
   TABLE
════════════════════════════════════════════ */
#holders-table {
  width: 100%;
  border-collapse: collapse;
  /* No fixed min-width — let JS / media queries decide */
}

#holders-table thead tr {
  background: rgba(123,47,255,0.12);
  border-bottom: 1px solid rgba(123,47,255,0.3);
}
#holders-table thead th {
  padding: 13px 10px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted-light);
  font-weight: 400;
  white-space: nowrap;
  text-align: left;
}
#holders-table thead th.th-r { text-align: right; }

#holders-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.12s ease;
}
#holders-table tbody tr:nth-child(odd)       { background: rgba(255,255,255,0.015); }
#holders-table tbody tr:hover                { background: rgba(123,47,255,0.09); }
#holders-table tbody tr:nth-child(odd):hover { background: rgba(123,47,255,0.09); }

#holders-table tbody td {
  padding: 10px 10px;
  font-size: 12px;
  vertical-align: middle;
}

/* Rank */
.td-rank {
  text-align: right;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
  padding-right: 14px !important;
  width: 42px;
}

/* Addr cells */
.td-addr {
  min-width: 0;
}
.td-addr-inner {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.addr-sub-label {
  font-family: var(--font-mono);
  font-size: 7.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1px;
}

/* Combined wallet + token in one cell for tight layouts */
.td-addr-combined {
  min-width: 0;
}
.combined-inner {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}
.combined-row {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}

/* Number cells */
.td-num {
  text-align: right;
  font-weight: 500;
  font-size: 11px;
  color: var(--white-warm);
  white-space: nowrap;
}

/* Pct */
.td-pct { text-align: right; white-space: nowrap; }
.pct-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
.pct-num  { font-size:11px; font-weight:600; color:var(--cyan); }
.pct-track { width:40px; height:2px; background:rgba(255,255,255,0.06); border-radius:1px; overflow:hidden; }
.pct-fill  { height:100%; border-radius:1px; background:linear-gradient(90deg,var(--violet),var(--cyan)); transition:width 0.5s ease; box-shadow:0 0 4px var(--cyan); }

/* Value */
.td-value { text-align:right; font-weight:500; color:var(--muted-light); font-size:11px; white-space:nowrap; }

/* Flash + glitch */
@keyframes row-flash {
  0%   { background: rgba(0,255,209,0.12); }
  100% { background: transparent; }
}
.row-flash { animation: row-flash 0.9s ease-out forwards; }

@keyframes glitch {
  0%   { clip-path:inset(40% 0 50% 0); transform:translate(-3px,0); opacity:0.6; }
  25%  { clip-path:inset(10% 0 80% 0); transform:translate(3px,0);  opacity:0.8; }
  50%  { clip-path:inset(70% 0 10% 0); transform:translate(-2px,0); opacity:0.7; }
  75%  { clip-path:inset(30% 0 60% 0); transform:translate(2px,0);  opacity:0.9; }
  100% { clip-path:none; transform:translate(0,0); opacity:1; }
}
.cell-glitch { animation: glitch 0.35s steps(1) forwards; }

/* ════════════════════════════════════════════
   STATUS BAR — moved below table
════════════════════════════════════════════ */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding: 0 4px;
  margin-bottom: 0;
}

.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(0,255,209,0.3);
  background: rgba(0,255,209,0.06);
  border-radius: 100px;
  padding: 7px 16px 7px 11px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  flex-shrink: 0;
  animation: live-pulse 2s ease-in-out infinite;
}
@keyframes live-pulse {
  0%,100% { transform:scale(1);   box-shadow:0 0 8px var(--cyan); }
  50%      { transform:scale(1.3); box-shadow:0 0 16px var(--cyan), 0 0 24px rgba(0,255,209,0.4); }
}
.live-text {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
}

.last-sync {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.08em;
}

/* ════════════════════════════════════════════
   LOADING / ERROR
════════════════════════════════════════════ */
.loading {
  padding: 70px 20px;
  text-align: center;
}
.loading-icon {
  font-family: var(--font-display);
  font-size: 54px;
  font-weight: 900;
  color: var(--violet);
  text-shadow: 0 0 30px var(--violet);
  animation: loading-pulse 1.4s ease-in-out infinite;
  display: block;
  margin-bottom: 18px;
}
@keyframes loading-pulse {
  0%,100% { opacity:0.3; transform:scale(0.95); }
  50%      { opacity:1;   transform:scale(1.05); }
}
.loading-text {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--muted-light);
}

.error-block { padding:60px 20px; text-align:center; }
.error-code  {
  font-family: var(--font-display);
  font-size: 44px; font-weight:900;
  color: var(--magenta);
  text-shadow: 0 0 20px rgba(255,60,172,0.5);
  display: block; margin-bottom: 12px;
}
.error-text   { font-size:13px; color:var(--muted-light); letter-spacing:0.05em; }
.error-detail {
  display:block; margin-top:8px;
  font-family:var(--font-mono); font-size:10px;
  color:rgba(255,60,172,0.6);
}

/* ════════════════════════════════════════════
   COUNTDOWN BAR
════════════════════════════════════════════ */
.countdown-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.04);
  z-index: 100;
}
.countdown-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--violet), var(--cyan));
  box-shadow: 0 0 8px var(--cyan);
  transition: width 1s linear;
}

/* ════════════════════════════════════════════
   RESPONSIVE STRATEGY

   ≥ 900px  → rank | wallet | token-acc | balance | % | value   (6 cols)
   600–899px→ rank | wallet+token combined | balance | % | value  (5 cols)
   < 600px  → rank | wallet+token combined | % | value           (4 cols, no balance)
════════════════════════════════════════════ */

/* Default: separate columns for wallet and token account */
.col-token-sep { display: table-cell; }
.col-combined  { display: none; }
.col-balance   { display: table-cell; }

/* 600–899px: merge wallet+token into one column, keep balance */
@media (max-width: 899px) and (min-width: 600px) {
  .col-token-sep { display: none; }
  .col-combined  { display: table-cell; }
  .col-balance   { display: table-cell; }
  #holders-table { min-width: 420px; }
}

/* <600px: merge wallet+token, drop balance */
@media (max-width: 599px) {
  .col-token-sep { display: none; }
  .col-combined  { display: table-cell; }
  .col-balance   { display: none; }
  #holders-table { min-width: 320px; }
  .pct-track     { width: 28px; }
  .td-rank       { width: 32px; font-size: 11px; }
}

/* Podium responsive */
@media (max-width: 860px) {
  .podium { grid-template-columns: 1fr; gap: 14px; }
  .podium-rank-num { font-size: 44px; }
  .copy-btn { font-size: 12px; }
}

@media (max-width: 480px) {
  .page { padding: 0 14px 60px; }
  .brand-title { font-size: clamp(30px, 9vw, 44px); }
  .header { padding: 32px 0 28px; }
}

/* ════════════════════════════════════════════
   REDUCED MOTION
════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  .live-dot    { animation: none !important; }
  .loading-icon{ animation: none !important; opacity: 0.6; }
  .row-flash   { animation: none !important; }
  .cell-glitch { animation: none !important; }
  .pct-fill    { transition: none !important; }
  .podium-card { transition: none !important; }
  .countdown-bar{ transition: none !important; }
}

</style>
</head>
<body>

<div class="bg-layer" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="bg-grid"></div>
  <div class="bg-scanlines"></div>
</div>

<div class="countdown-wrap" aria-hidden="true">
  <div class="countdown-bar" id="countdown-bar" style="width:100%"></div>
</div>

<div class="page">

  <!-- HEADER -->
  <header class="header">
    <p class="brand-eyebrow">
      <span class="dollar-sign">$</span>
      <span class="eyebrow-name" id="token-name">TOKEN</span>
      <span class="eyebrow-sep">·</span>
      <span class="eyebrow-detail">Solana · Mainnet · Live Data</span>
    </p>
    <h1 class="brand-title">
      Top <span class="accent">50</span><br>
      <span class="accent2">Holders</span>
    </h1>
  </header>

  <div class="divider" aria-hidden="true"></div>

  <!-- TOP 3 PODIUM -->
  <div class="podium" id="podium" aria-label="Top 3 holders"></div>

  <!-- TABLE 4–50 -->
  <div class="section-head">
    <span class="section-label">Positions 4 — 50</span>
  </div>

  <div class="table-panel">
    <div class="table-scroll">
      <div id="table-container">
        <div class="loading">
          <span class="loading-icon">◈</span>
          <p class="loading-text">Summoning the whales…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUS — below table -->
  <div class="status-bar">
    <div class="live-pill">
      <span class="live-dot" id="live-dot"></span>
      <span class="live-text" id="live-label">Live</span>
    </div>
    <span class="last-sync" id="last-sync">—</span>
  </div>

</div><!-- /page -->

<script>
/* ─── ELEMENTS ──────────────────────────────────── */
const podiumEl    = document.getElementById('podium');
const tableEl     = document.getElementById('table-container');
const lastSyncEl  = document.getElementById('last-sync');
const liveLabelEl = document.getElementById('live-label');
const liveDotEl   = document.getElementById('live-dot');
const countdownBar= document.getElementById('countdown-bar');

/* ─── STATE ─────────────────────────────────────── */
let prevData     = null;
let countdownInt = null;
let countdownVal = 30;

/* ─── HELPERS ───────────────────────────────────── */
function esc(t) {
  return String(t).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])
  );
}

/* Smart shorten: tries to fit more chars on wider screens */
function shorten(addr, head, tail) {
  if (!addr) return '';
  head = head || 6;
  tail = tail || 6;
  if (addr.length <= head + tail + 3) return addr;
  return addr.slice(0, head) + '…' + addr.slice(-tail);
}

function fmtQ(n) {
  if (typeof n !== 'number') return esc(String(n));
  return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}
function fmtP(n) {
  if (typeof n !== 'number') return esc(String(n));
  return n.toFixed(2);
}
function fmtV(n) {
  if (typeof n !== 'number') return esc(String(n));
  return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* ─── COPY ──────────────────────────────────────── */
async function copyAddr(btn, full) {
  try {
    await navigator.clipboard.writeText(full);
    const prev = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1600);
  } catch(_) {}
}

function makeCopyBtn(addr, headChars, tailChars) {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = shorten(addr, headChars, tailChars);
  btn.title = addr;
  btn.setAttribute('aria-label', `Copy address: ${addr}`);
  btn.addEventListener('click', () => copyAddr(btn, addr));
  return btn;
}

/* ─── UTILS ─────────────────────────────────────── */
function getMaxPct(data) {
  return data.reduce((m, r) => (typeof r['%'] === 'number' && r['%'] > m ? r['%'] : m), 0) || 1;
}

function buildPrevMap(data) {
  const m = {};
  if (!data) return m;
  data.forEach(r => {
    const k = r['Token Account'] || r['Account (Owner)'];
    if (k) m[k] = { qty: r['Quantity'] };
  });
  return m;
}

/* ─── PODIUM ────────────────────────────────────── */
function renderPodium(top3) {
  podiumEl.innerHTML = '';
  const labels  = ['🥇 First', '🥈 Second', '🥉 Third'];
  const classes = ['podium-card-1','podium-card-2','podium-card-3'];

  top3.forEach((row, i) => {
    const rank     = row['Rank'] ?? (i + 1);
    const owner    = row['Account (Owner)'] || '';
    const tokenAcc = row['Token Account']   || '';
    const qty      = fmtQ(row['Quantity']);
    const pct      = fmtP(row['%']);
    const val      = fmtV(row['Value']);

    const card = document.createElement('div');
    card.className = `podium-card ${classes[i]}`;

    /* Inner HTML structure */
    card.innerHTML = `
      <div class="podium-inner">
        <p class="podium-rank-label">${esc(labels[i])}</p>
        <span class="podium-rank-num">${rank}</span>
        <div class="podium-addresses">
          <div class="addr-row">
            <span class="addr-field-label">Wallet</span>
          </div>
          <div class="addr-row">
            <span class="addr-field-label">Token Acc</span>
          </div>
        </div>
        <p class="podium-quantity">${qty} tokens</p>
        <div class="podium-meta">
          <span class="podium-pct">${pct}%</span>
          <span class="podium-value">$${esc(val)}</span>
        </div>
      </div>`;

    /* Insert copy buttons after labels */
    const addrRows = card.querySelectorAll('.addr-row');

    /* Wallet btn — show more chars, wallet is the glory */
    const walletBtn = makeCopyBtn(owner, 8, 8);
    addrRows[0].appendChild(walletBtn);

    /* Token acc btn */
    const tokenBtn = makeCopyBtn(tokenAcc, 8, 8);
    addrRows[1].appendChild(tokenBtn);

    podiumEl.appendChild(card);
  });
}

/* ─── TABLE ─────────────────────────────────────── */
function renderTable(rest, prevMap, maxPct) {
  if (rest.length === 0) { tableEl.innerHTML = ''; return; }

  const table = document.createElement('table');
  table.id = 'holders-table';

  /* thead — three header variants controlled by CSS classes */
  table.innerHTML = `
    <thead>
      <tr>
        <th class="th-r">#</th>
        <th class="col-token-sep">Wallet</th>
        <th class="col-token-sep">Token Account</th>
        <th class="col-combined">Wallet · Token Account</th>
        <th class="th-r col-balance">Balance</th>
        <th class="th-r">Share</th>
        <th class="th-r">Value</th>
      </tr>
    </thead>
    <tbody id="tbody-inner"></tbody>`;

  const tbody = table.querySelector('#tbody-inner');

  rest.forEach((row, idx) => {
    const rank     = row['Rank'] ?? (idx + 4);
    const owner    = row['Account (Owner)'] || '';
    const tokenAcc = row['Token Account']   || '';
    const pctRaw   = typeof row['%'] === 'number' ? row['%'] : 0;
    const barW     = Math.min(100, (pctRaw / maxPct) * 100).toFixed(1);

    const key     = tokenAcc || owner;
    const prev    = prevMap[key];
    const changed = prev && prev.qty !== row['Quantity'];

    const tr = document.createElement('tr');
    if (changed) tr.classList.add('row-flash');

    /* Rank */
    const tdRank = document.createElement('td');
    tdRank.className = 'td-rank';
    tdRank.textContent = rank;
    tr.appendChild(tdRank);

    /* Wallet — separate column (≥900px) */
    const tdWallet = document.createElement('td');
    tdWallet.className = 'td-addr col-token-sep';
    const walletBtn = makeCopyBtn(owner, 7, 7);
    if (changed) walletBtn.classList.add('cell-glitch');
    tdWallet.appendChild(walletBtn);
    tr.appendChild(tdWallet);

    /* Token acc — separate column (≥900px) */
    const tdToken = document.createElement('td');
    tdToken.className = 'td-addr col-token-sep';
    const tokenBtn = makeCopyBtn(tokenAcc, 7, 7);
    tdToken.appendChild(tokenBtn);
    tr.appendChild(tdToken);

    /* Combined wallet + token — one column (< 900px) */
    const tdCombined = document.createElement('td');
    tdCombined.className = 'td-addr-combined col-combined';
    tdCombined.innerHTML = `
      <div class="combined-inner">
        <div class="combined-row">
          <span class="addr-sub-label">Wallet</span>
        </div>
        <div class="combined-row">
          <span class="addr-sub-label">Token</span>
        </div>
      </div>`;
    const combRows = tdCombined.querySelectorAll('.combined-row');
    const walletBtn2 = makeCopyBtn(owner, 6, 6);
    if (changed) walletBtn2.classList.add('cell-glitch');
    combRows[0].appendChild(walletBtn2);
    const tokenBtn2 = makeCopyBtn(tokenAcc, 6, 6);
    combRows[1].appendChild(tokenBtn2);
    tr.appendChild(tdCombined);

    /* Balance */
    const tdQty = document.createElement('td');
    tdQty.className = 'td-num col-balance';
    tdQty.textContent = fmtQ(row['Quantity']);
    if (changed) tdQty.classList.add('cell-glitch');
    tr.appendChild(tdQty);

    /* Share % */
    const tdPct = document.createElement('td');
    tdPct.className = 'td-pct';
    tdPct.innerHTML = `
      <div class="pct-wrap">
        <span class="pct-num">${fmtP(row['%'])}%</span>
        <div class="pct-track"><div class="pct-fill" style="width:${barW}%"></div></div>
      </div>`;
    tr.appendChild(tdPct);

    /* Value */
    const tdVal = document.createElement('td');
    tdVal.className = 'td-value';
    tdVal.textContent = '$' + fmtV(row['Value']);
    tr.appendChild(tdVal);

    tbody.appendChild(tr);
  });

  tableEl.innerHTML = '';
  tableEl.appendChild(table);
}

/* ─── RENDER ALL ────────────────────────────────── */
function renderAll(data) {
  if (!Array.isArray(data) || data.length === 0) {
    renderError('No holder data found.'); return;
  }
  const prevMap = buildPrevMap(prevData);
  const maxP    = getMaxPct(data);
  renderPodium(data.slice(0, 3));
  renderTable(data.slice(3), prevMap, maxP);
  prevData = data;
}

/* ─── ERROR ─────────────────────────────────────── */
function renderError(msg) {
  if (tableEl.querySelector('#holders-table')) return;
  tableEl.innerHTML = `
    <div class="error-block">
      <span class="error-code">ERR</span>
      <p class="error-text">Couldn't reach the chain right now.</p>
      <span class="error-detail">${esc(msg)}</span>
    </div>`;
}

/* ─── SYNC UI ───────────────────────────────────── */
function setSyncing(active) {
  if (active) {
    liveLabelEl.textContent = 'Syncing…';
    liveDotEl.style.background = 'var(--gold)';
    liveDotEl.style.boxShadow  = '0 0 8px var(--gold)';
  } else {
    liveLabelEl.textContent = 'Live';
    liveDotEl.style.background = 'var(--cyan)';
    liveDotEl.style.boxShadow  = '0 0 8px var(--cyan)';
  }
}

/* ─── COUNTDOWN ─────────────────────────────────── */
function startCountdown() {
  clearInterval(countdownInt);
  countdownVal = 30;
  countdownBar.style.width = '100%';
  countdownInt = setInterval(() => {
    countdownVal = Math.max(0, countdownVal - 1);
    countdownBar.style.width = ((countdownVal / 30) * 100) + '%';
  }, 1000);
}

/* ─── FETCH ─────────────────────────────────────── */
async function loadData() {
  setSyncing(true);
  try {
    const res  = await fetch(`date.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    renderAll(json);
    const now = new Date();
    lastSyncEl.textContent = `Synced ${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    setSyncing(false);
    startCountdown();
  } catch(err) {
    console.error(err);
    renderError(err.message);
    liveLabelEl.textContent = 'Error';
    liveDotEl.style.background = 'var(--magenta)';
    liveDotEl.style.boxShadow  = '0 0 8px var(--magenta)';
  }
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
